name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run CI checks before building release artifacts
  ci-gate:
    name: CI Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    needs: ci-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux GUI)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbcommon-dev libfontconfig1-dev libasound2-dev

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build TUI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-tui
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build GUI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-gui
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          
          # Human-readable platform names
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  PLATFORM="Linux-x64" ;;
            aarch64-unknown-linux-gnu) PLATFORM="Linux-ARM64" ;;
            x86_64-apple-darwin)       PLATFORM="macOS-Intel" ;;
            aarch64-apple-darwin)      PLATFORM="macOS-Apple-Silicon" ;;
            x86_64-pc-windows-msvc)    PLATFORM="Windows-x64" ;;
            aarch64-pc-windows-msvc)   PLATFORM="Windows-ARM64" ;;
            *)                         PLATFORM="${{ matrix.target }}" ;;
          esac

          ARCHIVE_NAME="DriveWipe-${TAG}-${PLATFORM}"
          mkdir -p dist

          cp target/${{ matrix.target }}/release/drivewipe${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/drivewipe-tui${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/drivewipe-gui${{ matrix.suffix }} dist/ 2>/dev/null || true
          cp LICENSE.md dist/
          cp README.md dist/

          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../${ARCHIVE_NAME}.zip" *
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" *
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: drivewipe-${{ matrix.target }}
          path: DriveWipe-*.*

  # ── Live ISO Build ──────────────────────────────────────────────────────
  build-live:
    name: Build Live ISO
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-live

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build TUI for live (static musl)
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            --package drivewipe-tui \
            --features live

      - name: Build CLI for live (static musl)
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            --package drivewipe-cli

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' crates/drivewipe-live/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "live_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build Live ISO
        run: |
          chmod +x scripts/build-live.sh
          DRIVEWIPE_LIVE_VERSION=${{ steps.version.outputs.live_version }} \
            ./scripts/build-live.sh
        env:
          SKIP_KERNEL_MODULE: "1"

      - name: Package Live artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p live-dist

          # Copy ISO if it was built
          cp output/*.iso live-dist/drivewipe-live-${TAG}.iso 2>/dev/null || true

          # Package PXE boot files
          mkdir -p live-dist/pxe
          cp output/vmlinuz live-dist/pxe/ 2>/dev/null || true
          cp output/initramfs.img live-dist/pxe/ 2>/dev/null || true
          cp live/pxe/ipxe/*.ipxe live-dist/pxe/
          cp live/pxe/dnsmasq.conf live-dist/pxe/
          cp live/pxe/README.md live-dist/pxe/

          cd live-dist
          tar czf "../drivewipe-live-${TAG}-pxe.tar.gz" pxe/

      - name: Upload Live artifacts
        uses: actions/upload-artifact@v7
        with:
          name: drivewipe-live
          path: |
            drivewipe-live.img
            drivewipe-live-*-pxe.tar.gz

  release:
    name: Create Release
    needs: [build, build-live]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum drivewipe-* > SHA256SUMS.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DriveWipe ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            # 🚀 DriveWipe ${{ steps.version.outputs.version }}

            DriveWipe is a professional-grade storage sanitization and drive management suite. This release provides a full version of the toolkit, including Desktop apps, TUI, and the Live ISO environment.

            ---

            ## 🖥️ Desktop Applications (Standalone)

            No installation required. Download the archive for your system and run the included binaries.

            | Platform | Architecture | Download |
            |:---|:---|:---|
            | **Linux** | x86_64 (Standard 64-bit) | `DriveWipe-${{ steps.version.outputs.version }}-Linux-x64.tar.gz` |
            | **Linux** | ARM64 | `DriveWipe-${{ steps.version.outputs.version }}-Linux-ARM64.tar.gz` |
            | **macOS** | Intel | `DriveWipe-${{ steps.version.outputs.version }}-macOS-Intel.tar.gz` |
            | **macOS** | Apple Silicon | `DriveWipe-${{ steps.version.outputs.version }}-macOS-Apple-Silicon.tar.gz` |
            | **Windows** | x64 (Standard 64-bit) | `DriveWipe-${{ steps.version.outputs.version }}-Windows-x64.zip` |
            | **Windows** | ARM64 | `DriveWipe-${{ steps.version.outputs.version }}-Windows-ARM64.zip` |

            ### 💡 Usage Tip
            DriveWipe requires **Administrative / Root** privileges to access raw disks.
            - **Windows**: Right-click -> "Run as Administrator".
            - **Linux/macOS**: Prefix commands with `sudo`.

            ---

            ## 🔒 Live Environment (For Secure Labs)

            Boot directly into a specialized OS to perform sanitization without host interference.

            | Type | File | Description |
            |:---|:---|:---|
            | **ISO Image** | `drivewipe-live-${{ steps.version.outputs.version }}.iso` | Write to USB with Rufus or `dd`. |
            | **PXE Network** | `drivewipe-live-${{ steps.version.outputs.version }}-pxe.tar.gz` | Dissected artifacts for network booting. |

            ---

            ### 🔐 Integrity Verification
            Check the authenticity of your downloads using `SHA256SUMS.txt`:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
