name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run CI checks before building release artifacts
  ci-gate:
    name: CI Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --all-features
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    needs: ci-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build TUI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-tui
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build GUI
        run: cargo build --release --target ${{ matrix.target }} --package drivewipe-gui
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="drivewipe-${TAG}-${{ matrix.target }}"
          mkdir -p dist

          cp target/${{ matrix.target }}/release/drivewipe${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/drivewipe-tui${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/drivewipe-gui${{ matrix.suffix }} dist/ 2>/dev/null || true
          cp LICENSE.md dist/
          cp README.md dist/

          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../${ARCHIVE_NAME}.zip" *
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" *
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drivewipe-${{ matrix.target }}
          path: drivewipe-*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum drivewipe-* > SHA256SUMS.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DriveWipe ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## Installation

            Download the archive for your platform and extract the binaries:

            | Platform | Architecture | Download |
            |---|---|---|
            | Linux | x86_64 | `drivewipe-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | ARM64 | `drivewipe-${{ steps.version.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS | x86_64 (Intel) | `drivewipe-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `drivewipe-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x86_64 | `drivewipe-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip` |
            | Windows | ARM64 | `drivewipe-${{ steps.version.outputs.version }}-aarch64-pc-windows-msvc.zip` |

            Each archive contains:
            - `drivewipe` — CLI tool
            - `drivewipe-tui` — Terminal UI
            - `LICENSE.md`
            - `README.md`

            Verify integrity with `SHA256SUMS.txt`.

            ## Requirements

            - Root/Administrator privileges required for raw device access
            - macOS NVMe commands require `nvme-cli` (`brew install nvme-cli`)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
