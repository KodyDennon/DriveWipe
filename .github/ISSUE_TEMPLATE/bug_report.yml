name: Bug Report
description: Report a bug in DriveWipe
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the information below to help us fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `drivewipe ...`
        2. Select drive...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: e.g., Ubuntu 24.04, macOS 15.2, Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DriveWipe Version
      description: Output of `drivewipe --version`
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - CLI (drivewipe)
        - TUI (drivewipe-tui)
        - GUI (drivewipe-gui)
    validations:
      required: true

  - type: textarea
    id: drive_info
    attributes:
      label: Drive Information
      description: If applicable, paste the output of `drivewipe info --device <path>`
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Include relevant log output or session files.
      render: shell
