# DriveWipe PXE Boot — dnsmasq configuration
#
# This file configures dnsmasq as a combined DHCP + TFTP server for
# PXE-booting DriveWipe Live clients.
#
# Usage:
#   sudo cp dnsmasq.conf /etc/dnsmasq.d/drivewipe.conf
#   sudo systemctl restart dnsmasq
#
# Adjust the "interface" and "dhcp-range" to match your network.

# ── Network interface ───────────────────────────────────────────────────
# Bind to a specific interface to avoid conflicts with other DHCP servers.
# Change this to your PXE-facing network interface.
interface=eth0
bind-interfaces

# ── DHCP configuration ─────────────────────────────────────────────────
# DHCP range: .100–.250 on a /24, 1-hour lease.
# Adjust the subnet to match your network.
dhcp-range=192.168.1.100,192.168.1.250,255.255.255.0,1h

# ── TFTP server ─────────────────────────────────────────────────────────
enable-tftp
tftp-root=/var/lib/tftpboot

# ── PXE boot options ───────────────────────────────────────────────────
# Tag BIOS clients and UEFI clients separately for correct boot firmware.

# BIOS PXE clients (architecture 0)
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,drivewipe/boot.ipxe

# UEFI PXE clients — x86_64 (architecture 7 or 9)
dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9
dhcp-boot=tag:efi-x86_64,drivewipe/boot.ipxe

# UEFI PXE clients — ARM64 (architecture 11)
dhcp-match=set:efi-aarch64,option:client-arch,11
dhcp-boot=tag:efi-aarch64,drivewipe/boot.ipxe

# ── DNS ─────────────────────────────────────────────────────────────────
# Disable DNS to avoid conflicts if another DNS server is running.
port=0

# ── Logging ─────────────────────────────────────────────────────────────
log-dhcp
log-facility=/var/log/drivewipe-pxe.log
