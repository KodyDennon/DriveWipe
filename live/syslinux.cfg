DEFAULT drivewipe
TIMEOUT 50
PROMPT 1

MENU TITLE DriveWipe Live Boot Menu

LABEL drivewipe
    MENU LABEL DriveWipe Live
    MENU DEFAULT
    LINUX /boot/vmlinuz-lts
    INITRD /boot/initramfs-lts
    APPEND root=/dev/ram0 quiet drivewipe.live=1 modules=loop,squashfs,sd-mod,usb-storage,uas,ahci,nvme,virtio_blk,virtio_scsi

LABEL drivewipe-verbose
    MENU LABEL DriveWipe Live (Verbose Boot)
    LINUX /boot/vmlinuz-lts
    INITRD /boot/initramfs-lts
    APPEND root=/dev/ram0 drivewipe.live=1 modules=loop,squashfs,sd-mod,usb-storage,uas,ahci,nvme,virtio_blk,virtio_scsi loglevel=7

LABEL drivewipe-debug
    MENU LABEL DriveWipe Live (Debug Shell)
    LINUX /boot/vmlinuz-lts
    INITRD /boot/initramfs-lts
    APPEND root=/dev/ram0 drivewipe.live=1 drivewipe.debug=1 modules=loop,squashfs,sd-mod,usb-storage,uas,ahci,nvme,virtio_blk,virtio_scsi loglevel=7 init=/bin/sh
