DEFAULT drivewipe
TIMEOUT 30
PROMPT 1

LABEL drivewipe
    MENU LABEL DriveWipe Live
    LINUX /boot/vmlinuz-lts
    INITRD /boot/initramfs-lts
    APPEND root=/dev/ram0 quiet modules=loop,squashfs,sd-mod,usb-storage,uas,ahci,nvme

LABEL drivewipe-verbose
    MENU LABEL DriveWipe Live (Verbose Boot)
    LINUX /boot/vmlinuz-lts
    INITRD /boot/initramfs-lts
    APPEND root=/dev/ram0 modules=loop,squashfs,sd-mod,usb-storage,uas,ahci,nvme
